<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f4f4f4;
        }

        .container {
            text-align: center;
        }

        .buttons {
            margin-top: 20px;
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .btn {
            padding: 10px 16px;
            border: 1px solid #333;
            border-radius: 6px;
            background: #fff;
            color: #333;
            text-decoration: none;
            font-weight: 600;
        }

        .btn:hover {
            background: #333;
            color: #fff;
        }
    </style>
</head>
<body>
    <main class="container">
        <h1>Tarea 05</h1>
        <div class="buttons">
            <a class="btn" href="/decolecta">Ir a Decolecta</a>
            <a class="btn" href="/grafico">Ir a Grafico</a>
        </div>
    </main>
</body>
</html>
